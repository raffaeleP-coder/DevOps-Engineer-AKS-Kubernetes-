apiVersion: v1
kind: Namespace
metadata:
  name: devops-namespace

apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: devops-namespace
  labels:
    app: devops-exercise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-exercise
  template:
    metadata:
      labels:
        app: devops-exercise
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: app
          image: crdevopsexercise-dedgf6f4a0f7grdv.azurecr.io/devops-exercise:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: production
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: devops-service
  namespace: devops-namespace
  labels:
    app: devops-exercise
spec:
  type: ClusterIP
  selector:
    app: devops-exercise
  ports:
    - name: http
      port: 8080
      targetPort: 8080
